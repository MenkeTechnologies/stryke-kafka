[package]
name = "stryke-kafka"
version = "0.18.0"
description = "Apache Kafka client for stryke. Produce, consume, admin against any Kafka 0.10+ cluster. cdylib loaded in-process — persistent FutureProducer + AdminClient across calls. Producer batching/compression now works as designed (v1 fork-per-call defeated it)."
authors = ["MenkeTechnologies"]
license = "MIT"
repository = "https://github.com/MenkeTechnologies/stryke-kafka"
edition = "2026"

[ffi]
lib-name = "stryke_kafka"
namespace = "Kafka"
exports = [
    "kafka__pkg_version",
    "kafka__ping",
    "kafka__cluster",
    "kafka__topics",
    "kafka__describe",
    "kafka__groups",
    "kafka__lag",
    "kafka__watermarks",
    "kafka__offsets_for_times",
    "kafka__produce",
    "kafka__produce_many",
    "kafka__consume",
    "kafka__create_topic",
    "kafka__delete_topic",
    "kafka__create_partitions",
    "kafka__describe_configs",
    "kafka__alter_configs",
    "kafka__delete_groups",
    "kafka__delete_records",
    "kafka__describe_group",
    "kafka__committed",
    "kafka__valid_topic_name",
    "kafka__sanitize_topic_name",
    "kafka__is_internal_topic",
    "kafka__topics_collide",
    "kafka__parse_brokers",
    "kafka__build_brokers",
    "kafka__normalize_brokers",
    "kafka__partition_for_key",
    "kafka__partition_for_key_crc32",
    "kafka__partition_for_key_fnv1a",
    "kafka__group_coordinator_partition",
    "kafka__transaction_coordinator_partition",
    "kafka__range_assignment",
    "kafka__roundrobin_assignment",
    "kafka__sticky_assignment",
    "kafka__replica_assignment",
    "kafka__assignment_diff",
    "kafka__assignment_by_broker",
    "kafka__format_offset",
    "kafka__topic_metric_name",
    "kafka__parse_topic_partition",
    "kafka__format_topic_partition",
    "kafka__compression_codec",
    "kafka__cleanup_policy",
    "kafka__acks_value",
    "kafka__parse_duration_ms",
    "kafka__isr_health",
    "kafka__offset_lag",
]

[scripts]
build = "cargo build --release"
build-debug = "cargo build"
clean = "cargo clean"
test = "s test t/"
install = "s pkg install -g ."
