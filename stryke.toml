[package]
name = "stryke-kafka"
version = "0.2.1"
description = "Apache Kafka client for stryke. Produce, consume, admin against any Kafka 0.10+ cluster. cdylib loaded in-process — persistent FutureProducer + AdminClient across calls. Producer batching/compression now works as designed (v1 fork-per-call defeated it)."
authors = ["MenkeTechnologies"]
license = "MIT"
repository = "https://github.com/MenkeTechnologies/stryke-kafka"
edition = "2026"

[ffi]
lib-name = "stryke_kafka"
namespace = "Kafka"
exports = [
    "kafka__pkg_version",
    "kafka__ping",
    "kafka__cluster",
    "kafka__topics",
    "kafka__describe",
    "kafka__groups",
    "kafka__lag",
    "kafka__watermarks",
    "kafka__offsets_for_times",
    "kafka__produce",
    "kafka__produce_many",
    "kafka__consume",
    "kafka__create_topic",
    "kafka__delete_topic",
    "kafka__create_partitions",
    "kafka__describe_configs",
    "kafka__alter_configs",
    "kafka__delete_groups",
]

[scripts]
build = "cargo build --release"
build-debug = "cargo build"
clean = "cargo clean"
test = "s test t/"
install = "s pkg install -g ."
